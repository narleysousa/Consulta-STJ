name: Publicar site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Garantir arquivos mínimos
        run: |
          test -f docs/index.html
          test -f docs/resultados.json || echo '{"gerado_em":"","filtro":{},"total":0,"processos":[]}' > docs/resultados.json

      - name: Publicar em gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
