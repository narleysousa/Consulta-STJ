name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar sintaxe
        run: python -m py_compile app.py consulta_stj_parana.py

      - name: Testar imports
        run: python -c "from consulta_stj_parana import buscar_processos, buscar_por_numero, ProcessoResultado"
