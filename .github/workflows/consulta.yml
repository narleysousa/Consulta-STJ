name: Consulta STJ

on:
  workflow_dispatch:
    inputs:
      data_inicio:
        description: Data inicial (AAAA-MM-DD)
        required: true
        default: "2026-06-01"
      data_fim:
        description: Data final (AAAA-MM-DD)
        required: true
        default: "2026-06-16"
      modo:
        description: Critério de filtro
        type: choice
        options: [ambos, transito, baixa, qualquer]
        default: ambos
      limite:
        description: Limite de processos
        required: true
        default: "100"
      tipo_data:
        description: Tipo de data
        type: choice
        options: [movimentacao, ajuizamento, atualizacao]
        default: movimentacao
  schedule:
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  consulta:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Definir período
        id: periodo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "inicio=${{ inputs.data_inicio }}" >> "$GITHUB_OUTPUT"
            echo "fim=${{ inputs.data_fim }}" >> "$GITHUB_OUTPUT"
            echo "modo=${{ inputs.modo }}" >> "$GITHUB_OUTPUT"
            echo "limite=${{ inputs.limite }}" >> "$GITHUB_OUTPUT"
            echo "tipo=${{ inputs.tipo_data }}" >> "$GITHUB_OUTPUT"
          else
            echo "inicio=$(date -u -d '30 days ago' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            echo "fim=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            echo "modo=ambos" >> "$GITHUB_OUTPUT"
            echo "limite=100" >> "$GITHUB_OUTPUT"
            echo "tipo=movimentacao" >> "$GITHUB_OUTPUT"
          fi

      - name: Executar consulta
        run: |
          set -euo pipefail
          python3 gerar_site.py \
            --modo "${{ steps.periodo.outputs.modo }}" \
            --data-inicio "${{ steps.periodo.outputs.inicio }}" \
            --data-fim "${{ steps.periodo.outputs.fim }}" \
            --tipo-data "${{ steps.periodo.outputs.tipo }}" \
            --limite "${{ steps.periodo.outputs.limite }}" 2>&1 | tee consulta.log

      - name: Log em caso de falha
        if: failure()
        run: tail -n 40 consulta.log || true

      - name: Resumo
        run: |
          TOTAL=$(python3 -c "import json; print(json.load(open('docs/resultados.json'))['total'])")
          echo "## Consulta STJ Paraná" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Período:** ${{ steps.periodo.outputs.inicio }} a ${{ steps.periodo.outputs.fim }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Modo:** ${{ steps.periodo.outputs.modo }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Processos:** ${TOTAL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Site: https://narleysousa.github.io/Consulta-STJ/" >> "$GITHUB_STEP_SUMMARY"

      - name: Artefatos (CSV / Excel)
        uses: actions/upload-artifact@v4
        with:
          name: resultados-${{ github.run_number }}
          path: |
            docs/resultados.csv
            docs/resultados.xlsx
            docs/resultados.json

      - name: Publicar resultados na branch main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add docs/resultados.csv docs/resultados.xlsx docs/resultados.json
          if git diff --staged --quiet; then
            echo "Sem alterações nos arquivos de resultado."
            exit 0
          fi
          git commit -m "Atualiza resultados ($(date -u +%Y-%m-%d))"
          git push origin main
